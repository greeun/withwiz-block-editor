version: "2"

checks:
  argument-count:
    config:
      threshold: 4
  complex-logic:
    config:
      threshold: 4
  file-lines:
    config:
      threshold: 250
  method-complexity:
    config:
      threshold: 5
  method-lines:
    config:
      threshold: 25
  nested-control-flow:
    config:
      threshold: 4
  return-statements:
    config:
      threshold: 4

exclude-patterns:
  - "**/*.spec.ts"
  - "**/*.test.ts"
  - "dist/**"
  - "node_modules/**"

plugins:
  eslint:
    enabled: true
    config:
      extensions:
        - ".ts"
        - ".tsx"
  prettier:
    enabled: true

formatters:
  prettier:
    enabled: true
